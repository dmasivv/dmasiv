name: dmasiv
options:
  bundleIdPrefix: com.dmasiv
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

targets:
  dmasiv:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: dmasiv
        excludes:
          - "**/.DS_Store"
    resources:
      - path: dmasiv/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dmasiv.app
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: dmasiv/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
